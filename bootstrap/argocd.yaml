apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      values: |
        configs:
          params:
            server.insecure: true

        server:
          service:
            type: ClusterIP
          extraArgs:
            - --insecure

        controller:
          replicas: 1

        repoServer:
          replicas: 1

        applicationSet:
          enabled: true

        dex:
          enabled: false

        redis:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
