apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Eftychiou/my-k8s-argocd.git   # points to your Git repo
    path: bootstrap/argocd
    chart: argo-cd
    targetRevision: 5.51.6   # pin version!
    

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true