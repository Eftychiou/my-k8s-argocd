apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6   # pin version!
    path: bootstrap/argocd

    helm:
      valueFiles:
        - https://raw.githubusercontent.com/Eftychiou/my-k8s-argocd/HEAD/bootstrap/argocd/values/argocd-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true