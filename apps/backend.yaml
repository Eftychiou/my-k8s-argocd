apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/my-k8s  # set your git repo URL
    path: helm/backend
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: george-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
