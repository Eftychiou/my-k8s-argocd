namespace: george-app

# Must match traefik.ingressClass.name and traefik.providers.kubernetesIngress.ingressClass below.
# Use a distinct name when k3s (or another) Traefik already owns the default IngressClass "traefik".
ingressClassName: george-traefik

backend:
  service:
    port: 80
    targetPort: 5678

frontend:
  service:
    port: 80
    targetPort: 80

# Mirrors helm/istio-gateway/values.yaml: istio.* → edge.* (Traefik entrypoint instead of gateway/portName)
edge:
  namespace: george-app
  host: george.com
  entryPoint: web
  port: 80
  protocol: HTTP

# Catch-all when Host is missing or not george.com (IP access, wrong hostname).
fallback:
  enabled: true
  html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <title>No matching host</title>
    </head>
    <body>
      <p>No hostname matched this ingress. Use <strong>george.com</strong> or send a matching <code>Host</code> header.</p>
    </body>
    </html>

traefik:
  ingressClass:
    enabled: true
    # Avoid competing with k3s default Traefik; our Ingresses set ingressClassName explicitly.
    isDefaultClass: false
    name: george-traefik
  providers:
    kubernetesIngress:
      enabled: true
      # Only Ingresses with spec.ingressClassName == george-traefik are loaded by *this* Traefik.
      ingressClass: george-traefik
    kubernetesCRD:
      enabled: true
  ports:
    web:
      expose:
        default: true
      exposedPort: 80
      protocol: TCP
  # NodePort for local k3s/kind; use LoadBalancer when EXTERNAL-IP is provisioned (cloud/MetalLB).
  service:
    type: NodePort
    # type: LoadBalancer # Needs METALLB
