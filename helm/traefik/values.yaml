namespace: george-app

backend:
  service:
    port: 80
    targetPort: 5678

frontend:
  service:
    port: 80
    targetPort: 80

# Mirrors helm/istio-gateway/values.yaml: istio.* → edge.* (Traefik entrypoint instead of gateway/portName)
edge:
  namespace: george-app
  host: george.com
  entryPoint: web
  port: 80
  protocol: HTTP

# Catch-all when Host is missing or not george.com (IP access, wrong hostname).
fallback:
  enabled: true
  html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <title>No matching host</title>
    </head>
    <body>
      <p>No hostname matched this ingress. Use <strong>george.com</strong> or send a matching <code>Host</code> header.</p>
    </body>
    </html>

traefik:
  ingressClass:
    enabled: true
    isDefaultClass: true
  ports:
    web:
      expose:
        default: true
      exposedPort: 80
      protocol: TCP
  # NodePort for local k3s/kind; use LoadBalancer when EXTERNAL-IP is provisioned (cloud/MetalLB).
  service:
    type: NodePort
    # type: LoadBalancer # Needs METALLB
  providers:
    kubernetesIngress:
      enabled: true
    kubernetesCRD:
      enabled: true
