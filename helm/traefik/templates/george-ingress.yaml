# Fallback Ingress
{{- if .Values.fallback.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-fallback
  namespace: {{ .Values.namespace }}
data:
  index.html: |-
{{ .Values.fallback.html | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-fallback
  namespace: {{ .Values.namespace }}
  labels:
    app: traefik-fallback
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik-fallback
  template:
    metadata:
      labels:
        app: traefik-fallback
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: traefik-fallback
---
apiVersion: v1
kind: Service
metadata:
  name: traefik-fallback
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: traefik-fallback
  ports:
    - port: 80
      targetPort: 80
---
{{- end }}

{{- if .Values.fallback.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-fallback
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-fallback
                port:
                  number: 80
{{- end }}

# George App Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: george-app
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  rules:
    - host: {{ .Values.edge.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.service.port }}