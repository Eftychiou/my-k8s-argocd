apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: george-app
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - host: {{ .Values.edge.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.service.port }}
