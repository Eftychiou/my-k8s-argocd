apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: george-gateway
  namespace: {{ .Values.istio.namespace }}
spec:
  selector:
    istio: {{ .Values.istio.gatewaySelector }}
  servers:
    - port:
        number: {{ .Values.istio.port }}
        name: {{ .Values.istio.portName }}
        protocol: {{ .Values.istio.protocol }}
      hosts:
        - "{{ .Values.istio.host }}"
