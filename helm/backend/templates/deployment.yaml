apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image }}:{{ .Values.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          args: {{- toYaml .Values.args | nindent 12 }}
          env: {{- if .Values.env }}{{ toYaml .Values.env | nindent 12 }}{{ else }}[]{{ end }}
