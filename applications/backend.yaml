apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Eftychiou/my-k8s-argocd.git
    path: helm/backend
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: george-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
