apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Eftychiou/my-k8s-argocd.git
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: george-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
