apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Istiod patches the validation webhook when it becomes ready (caBundle + failurePolicy
  # Ignore→Fail). Helm-rendered manifests stay at the bootstrap values, so Argo would
  # otherwise report perpetual OutOfSync.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[] | select(.name == "rev.validation.istio.io") | .failurePolicy
        - .webhooks[] | select(.name == "rev.validation.istio.io") | .clientConfig.caBundle

  project: default
  source:
    path: helm/istiod   # <--- now points to local chart
    repoURL: https://github.com/Eftychiou/my-k8s-argocd.git
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
