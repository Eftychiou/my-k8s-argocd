apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.4.11
    helm:
      skipCrds: true
      # Change ui.bannercontent and push → sync → banner text updates (quick GitOps check).
      #
      # Anonymous UI: no login prompt. ONLY for isolated lab / port-forward — anyone who can
      # reach the UI has full Argo CD admin. Remove accounts.anonymous + rbac lines for real clusters.
      values: |
        configs:
          cm:
            ui.bannercontent: "Values from Git — edit me in applications/argocd.yaml"
            ui.bannerpermanent: "true"
            accounts.anonymous.enabled: "true"
          rbac:
            policy.csv: |
              g, anonymous, role:admin

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CRD manifests exceed the ~256Ki limit for kubectl's last-applied-configuration
      # annotation when using client-side apply; SSA avoids that and fixes SyncFailed on CRDs.
      - ServerSideApply=true
